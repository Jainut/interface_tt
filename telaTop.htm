<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela Top</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
    <link href="style.css" rel="stylesheet">
    <script src="index.js" defer></script>
</head>
<body class="bg-light">

    <nav class="navbar bg-primary text-white p-3">
        <span class="fs-4">Registro Top</span>
    </nav>
    <button type = "button" class="btn btn-primary" onclick="sairtop()">Voltar</button>
    <h4 class="text-center mt-5"></h4>

    
    <div class="container mt-4">
        <div class="card p-4 shadow">

            
            <div class="row mb-3">
                <div class="col">
                    <select class="form-select">
                        <option>Nº da OP</option>
                        <option>teste</option>
                    </select>
                </div>
                <div class="col">
                    <select class="form-select">
                        <option>Produto</option>
                        <option>teste2</option>
                    </select>
                </div>
                <div class="col">
                    <select class="form-select">
                        <option>Quantidade</option>
                    </select>
                </div>
            </div>

            
            <div class="row mb-3">
                <div class="col">
                    <select class="form-select">
                        <option>Materiais</option>
                    </select>
                </div>
                <div class="col">
                    <select class="form-select">
                        <option>Prazo</option>
                    </select>
                </div>
                <div class="col">
                    <select class="form-select">
                        <option>Responsável</option>
                        <option>Lobato67</option>
                        <option>Weverton</option>
                        <option>Yan</option>
                    </select>
                </div>
            </div>

            
            <div class="row mb-3">
                <div class="col">
                    <select class="form-select">
                        <option>Equipamento</option>
                    </select>
                </div>
                <div class="col">
                    <select class="form-select">
                        <option>Status</option>
                    </select>
                </div>
            </div>

            
            <div class="text-center">
                <button id="btsalvar" class="btn btn-success">
                    Salvar
                </button>
            </div>

        </div>
    </div>
    
    <!-- Elementos de notificação Para o Usuário usando Bootstrap-->
    <div class="position-fixed top-0 end-0 p-3">
        <div id="notificacao" class="toast align-items-center text-bg-success border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body">
                    Dados salvos com sucesso!
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>
</body>
</html>
