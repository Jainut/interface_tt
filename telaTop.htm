<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela Top</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="style.css" rel="stylesheet">
    <script src="index.js" defer></script>
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar bg-primary text-white p-3">
        <span class="fs-4">Registro Top</span>
    </nav>

    <!-- Botão voltar -->
    <button class="btn btn-primary position-absolute top-3 start-3 m-3" onclick="sairtop()">
        Voltar
    </button>

    <h4 class="text-center mt-5">Tela-Top</h4>

    
    <div class="container mt-4">
        <div class="card p-4 shadow">

            
            <div class="row mb-3">
                <div class="col">
                    <select class="form-select">
                        <option>Nº da OP</option>
                    </select>
                </div>
                <div class="col">
                    <select class="form-select">
                        <option>Produto</option>
                    </select>
                </div>
                <div class="col">
                    <select class="form-select">
                        <option>Quantidade</option>
                    </select>
                </div>
            </div>

            
            <div class="row mb-3">
                <div class="col">
                    <select class="form-select">
                        <option>Materiais</option>
                    </select>
                </div>
                <div class="col">
                    <select class="form-select">
                        <option>Prazo</option>
                    </select>
                </div>
                <div class="col">
                    <select class="form-select">
                        <option>Responsável</option>
                    </select>
                </div>
            </div>

            
            <div class="row mb-3">
                <div class="col">
                    <select class="form-select">
                        <option>Equipamento</option>
                    </select>
                </div>
                <div class="col">
                    <select class="form-select">
                        <option>Status</option>
                    </select>
                </div>
            </div>

            
            <div class="text-center">
                <button id="btsalvar" class="btn btn-success">
                    Salvar
                </button>
            </div>

        </div>
    </div>

</body>
</html>
