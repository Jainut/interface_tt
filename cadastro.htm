<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
        crossorigin="anonymous"></script>
    <script src="index.js" defer></script>
</head>
<body class="d-flex justify-content-center align-items-center vh-100">

    <button type="button" class="btn btn-primary position-absolute top-0 start-0 m-3" onclick="voltarLogin()">Voltar</button>

    <div class="card p-3" style="width: 18rem;">
        <div class="card-body">
            <h5 class="card-title text-center mb-3">Cadastro</h5>

            <form>
                <div class="d-flex align-items-center mb-3">
                    <label for="name" class="me-2">Nome:</label>
                    <input type="text" class="form-control" id="name">
                </div>

                <div class="d-flex align-items-center mb-3">
                    <label for="email" class="me-2">Email:</label>
                    <input type="email" class="form-control" id="email">
                </div>

                <div class="d-flex align-items-center mb-3">
                    <label for="password" class="me-2">Senha:</label>
                    <input type="password" class="form-control" id="password">
                </div>

                <button type="submit" class="btn btn-primary w-100">Cadastrar</button>
            </form>
        </div>
    </div>

</body>
</html>
