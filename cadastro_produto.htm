<body>

    <nav class="navbar bg-primary text-white p-3 shadow-sm mb-4">
        <span class="fs-4 ms-3">Cadastrar Produtos</span>
    </nav>

    <div class="d-flex justify-content-center align-items-center">

    <div class="card p-4 shadow" style="width: 25rem;">
        <h4 class="text-center mb-4">Novo Produto</h4>
        <form action="cadastrar_produto.php" method="POST">
            <div class="mb-3">
                <label class="form-label">Nome do Produto</label>
                <input type="text" name="nome" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Data de Saída Prevista</label>
                <input type="datetime-local" name="data_saida" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-success w-100">Salvar Produto</button>
            <button class="btn btn-primary w-100 mt-2" onclick="entrarTela()">Voltar</button>
        </form>
    </div>
